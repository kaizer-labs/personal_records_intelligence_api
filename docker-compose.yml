services:
  api:
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      APP_NAME: Personal Records Intelligence API
      APP_VERSION: 0.1.0
      APP_ENV: development
      CORS_ORIGINS: http://localhost:5173
      DUCKDB_PATH: /app/data/duckdb/app.duckdb
      STORAGE_ROOT: /app/data/library
      EXAMPLES_PATH: /app/examples
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_CHAT_MODEL: qwen2.5:7b
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      OLLAMA_CHAT_NUM_CTX: "4096"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - .:/app

  ui:
    build:
      context: ../personal_records_intelligence_ui
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - api
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ../personal_records_intelligence_ui:/app
      - ui_node_modules:/app/node_modules

volumes:
  ui_node_modules:
